{% extends 'base.html' %}

{% block content %}
<p>{{ movies|length }} Titles</p>

<!-- 仅登录用户显示新增表单 -->
{% if current_user.is_authenticated %}
<form method="post">
    Title <input type="text" name="title" autocomplete="off" required>
    Year <input type="text" name="year" autocomplete="off" required>
    <input class="btn" type="submit" name="submit" value="Add">
</form>
{% endif %}

<!-- 电影列表（表格） -->
<table class="movie-table">
    {% for movie in movies %}
    <tr>
        <td>{{ movie.title }} - {{ movie.year }}</td>
        <td class="float-right">
            <!-- 仅登录用户显示编辑/删除按钮 -->
            {% if current_user.is_authenticated %}
                <a class="btn" href="{{ url_for('main.edit', movie_id=movie.id) }}">Edit</a>
                <form class="inline-form" method="post" action="{{ url_for('main.delete', movie_id=movie.id) }}">
                    <input class="btn" type="submit" name="delete" value="Delete" onclick="return confirm('Are you sure?')">
                </form>
            {% endif %}
            <!-- IMDb链接始终显示 -->
            <a class="imdb" href="https://www.imdb.com/find?q={{ movie.title }}" target="_blank" title="Find this movie on IMDb">IMDb</a>
        </td>
    </tr>
    {% endfor %}
</table>

<img alt="Walking Totoro" class="totoro" src="{{ url_for('static', filename='images/totoro.gif') }}" title="to~to~ro~">
{% endblock %}
